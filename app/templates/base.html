<!doctype html>
<html lang="es" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}PcComponentes Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        ink: { 950: '#0a0d14', 900: '#0f1320', 800: '#161b2b', 700: '#202640' },
                        accent: { 400: '#7c9bff', 500: '#5b7dff', 600: '#4a69e8' },
                    },
                    boxShadow: {
                        card: '0 1px 0 rgba(255,255,255,0.04) inset, 0 12px 28px -12px rgba(0,0,0,0.6)',
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-ink-950 text-slate-100 font-sans min-h-screen antialiased">
    <header class="border-b border-white/5 backdrop-blur sticky top-0 z-20 bg-ink-950/80">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center gap-3">
            <a href="{{ url_for('main.index') }}" class="flex items-center gap-2.5 group">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent-400 to-accent-600 grid place-items-center shadow-lg shadow-accent-500/30">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/>
                    </svg>
                </div>
                <div>
                    <div class="text-sm font-semibold leading-none">PcComponentes Tracker</div>
                    <div class="text-[10px] uppercase tracking-widest text-slate-500 mt-1">price history &amp; alerts</div>
                </div>
            </a>
            <div class="flex-1"></div>
            <a href="https://github.com/Odev-M/pccomponentes-tracker" target="_blank" rel="noopener"
               class="text-xs text-slate-400 hover:text-slate-100 transition-colors flex items-center gap-1.5">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.73.5.75 5.48.75 11.75c0 4.96 3.21 9.17 7.67 10.66.56.1.77-.24.77-.54 0-.27-.01-1-.02-1.96-3.12.68-3.78-1.5-3.78-1.5-.51-1.3-1.25-1.65-1.25-1.65-1.02-.7.08-.68.08-.68 1.13.08 1.72 1.16 1.72 1.16 1 1.72 2.64 1.22 3.28.93.1-.73.39-1.22.71-1.5-2.49-.28-5.11-1.25-5.11-5.56 0-1.23.44-2.23 1.15-3.02-.12-.28-.5-1.42.11-2.95 0 0 .94-.3 3.08 1.15a10.7 10.7 0 0 1 5.61 0c2.14-1.45 3.08-1.15 3.08-1.15.61 1.53.23 2.67.11 2.95.72.79 1.15 1.79 1.15 3.02 0 4.32-2.62 5.28-5.12 5.56.4.35.76 1.03.76 2.07 0 1.5-.01 2.71-.01 3.08 0 .3.2.65.78.54 4.46-1.49 7.66-5.7 7.66-10.66C23.25 5.48 18.27.5 12 .5z"/></svg>
                GitHub
            </a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="max-w-5xl mx-auto px-6 py-10 text-center text-xs text-slate-500">
        Open source · MIT · made with 💙 for price hunters
    </footer>

    <div id="toast-root" class="fixed bottom-6 right-6 flex flex-col gap-2 z-50"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
